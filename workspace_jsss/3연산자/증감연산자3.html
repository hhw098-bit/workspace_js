<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
let a=3;    let b= 4;
let c= a++ + ++b   + b++  + ++a;
//  18 = 3 + 5 + 5 + 5;
// c = 18;  a = 5;   b = 6;
console.log(c);
console.log(a);
console.log(b);
document.write(c,"<br>",a,"<br>",b );

// c변수값을 계산하는 과정
/*
1. a++ : 현재 a의 값은 3입니다 
            이식은 현제 a의 값을 사용하고 이후에 a를 1증가시킵니다
            따라서 이시점에서는 a++는 3을 반환하고 나중에a는 4가됩니다.
2. ++b : 현제 b의 값은 4입니다 이식을 먼저 b의 값을 1증가시키고 그다음에 값을 사용합니다 
            따라서 ++b는 5를 반환하고 b는 5가 됩니다.

3. b++ : 현재 b의 값은 5입니다 이식은 현제 b의 값을 사용하고 이후에 b를 1증가시킵니다.
            따라서 이시점에서는 b++는 5를 반환하고 b는 6이 됩니다
4. 




5. c= a++   + ++b  + b++  +   ++a
       3   + 5    +  5   +    5  = 18







*/





</script>




    
</body>
</html>
