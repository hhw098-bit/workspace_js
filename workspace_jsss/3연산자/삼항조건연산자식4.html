<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
            삼항조건연산자식을 이용하여 엘리베이터가 올라가고
            내려가는 동작을 구현해보자 이경우 각 버튼을 누를때의
            동작을 별도의 코드로 나누어 작성할수 있음
        
        */
        //엘리베이터 상태와 화살표 버튼 종류를 저장할 변수
        let currentFloor = 1; //현재 위치 층
        let button = ''; //'up' or 'down'
        //================================
        //위쪽 화살표를 눌렀다고 가정하고  'up'문자열 버튼 변수에 저장
        button = 'up';
        //삼항조건연산자식 활용
        //위쪽 화살표 'up' 눌럿으므로 direction변수 메모리에는 'up' 문자열 저장시키자
        let direction = button === 'up' ? 'up' : 'down';
        //                up   ===  up  ?  true
        //위쪽 화살표 'up'를 눌럿다면 ? 2를 만들어서 다시 currentFloor에 저장시키자
        currentFloor = direction === 'up' ? currentFloor + 1 : currentFloor - 1;
        //  2         =                     ?      1     +1
        //출력 -> 엘리베이터가 '올라갑니다' 현재층 2층

        console.log(`엘리베이터가 ${direction === 'up' ? '올라갑니다' : '내려갑니다'}, 현재 층 : ${currentFloor}층`);
        //엘리베이터가 + (direction == 'up' ? 올라갑니다 : 내려갑니다) + ".현재 층 :" + currentFloor

        //====================================================================================================

        //아래쪽 화살표 버튼을 눌렀다고 가정하고 버튼변수에 'down' 문자열 저장
        button = 'down';
        // 아래쪽 화살표를 눌렀다면? 누른 'down' 문자열을 direction변수에 다시 저장
        direction = button === 'down' ? 'down' : 'up';
        //아래쪽 화살표를 누르면 2층에서 1층으로 내려가게 하기위해 1을 currentFloor변수에 다시 저장
        currentFloor = direction === 'down' ? currentFloor - 1 : currentFloor + 1;
        //엘리베이터가 내려갑니다. 현재층:
        console.log(`엘리베이터가 ${direction === 'down' ? '내려갑니다' : '올라갑니다'}, 현재 층 : ${currentFloor}층`);

        let result = 10 === 10 ? 100 : 0
        //          = true      ? true      :  false
        // 100      =              

        console.log(result); // 100
    </script>





</body>

</html>
