<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num3 = 10;
        //num3 변수값 10을 먼저 출력후 그다음에 실행하기전에 9로 만들어줌
        document.write(num3--,"<br>"); //10
        document.write(num3,"<br>"); // 9

        document.write(--num3,"<br>"); //변수값 9앞에 --가 잇으므로 먼저 --해서 8로만든다.








    </script>







</body>
</html>
