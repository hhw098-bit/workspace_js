<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



</head>




<body>
    <!-- 자바스크립트 코드를 작성하는 영역의 태그 = 스크립트 선언문 태그-->
    <script>
        //주제 : 복합대입 연산자 기호들 사용
        // += -= /= %= *=
        let number = 10;
        //문제: 넘버변수에 저장된 10을 20으로 만들어 저장하는 방법?
        // 1. number = 20; 으로 20->10으로 수정시킴
        //number = 20;
        // 2. 넘버변수에 저장된 10에 +10하여 20으로 만든뒤 20을 넘버변수에 다시 저장
        number = number + 10;   //number => number(10) + 10; => 20
        document.write(number, "<br>");
        // 3. 복합대입 연산자 +=를 사용해 넘버변수에 저장된 10을20으로 저장 가능
        //----------------현제 넘버변수는 20으로 저장됨-----------------------

        number += 10; //number = number + 10;
        //넘버 변수에 저장된 20에 +10을 하여 30으로 계산
        //       number + 10;
        //           20 + 10;
        //              30;
        //30을 대입연산자를 이용해서 앞에 작성한 넘버변수애 대입해서 최종 저장
        document.write(number, "<br>");//30 <br>
        //--------------- 현제 넘버변수는 30으로 저장됨-------------------------- => let number =30;
        //넘버변수에 저장된 값을 10차감해서 다시 저장
        number -= 10; // number= number-10;
        //               number-10 => 30-10 => 20
        //              20값을 대입연산자 기호로 넘버변수에 투입되어 저장됨  number=20
        document.write(number, "<br>"); // 20<br>
        //---------------현제 넘버변수는 20으로 저장됨-----------------------------

        //넘버변수에 저장된값에 10을 곱해서 다시 저장
        number = number * 10; // number(20)= 20*10 =>number(20) =200 => number(200)   =    number *= 10;
        document.write(number, "<br>");//200 <br>
        //----------------현재 넘버변수는 200으로 저장됨-------------------------------

        //넘버변수에 저장된 200을 10로 나눈 몫을 대입연산자로 다시 넘버변수에 저장
        number /= 10; // number = number / 10;     
        //  number /10; => 200 /10;  => 20;     넘버변수에 20저장
        document.write(number, "<br>");
        //---------------현재 넘버변수는 20으로 저장됨----------------------------------

        //넘버변수에 저장된 20을 10으로 나눈 나머지값 0을 구해서 저장
        number %= 10; // number = number % 10;
        // number % 10; => 20 % 10; => 0;   결과값을 대입연산자로 넘버변수에 0을 저장 number = 0;
        document.write(number, "<br>");

    </script>





</body>

</html>
