<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
/*
sum 함수선언
기능 : 두개의 인수를 매개변수로 각각 전달받아 전달받은 
인수의 자료형이 number(숫자형)이면 두인수를 더한
결과값을 반환하고 전달받은 인수의 자료형이 number(숫자형)이 아니면 
함수의 {  }를 즉시 뻐져사가게 해서 종료시키는 기능의 sum함수선언

문제 : 두인수를 전달 받아 두인수가 숫자면 더해서 반환하는 기능의 sum함수를 만들어라

*/
function sum(num1, num2) {
  if (typeof num1 !== "number" || typeof num2 !== "number") {
    return;//sum 함수의 {  }를 빠져나가 함수 기능을 즉시 종료
  }
  // num1 + num2 매개변수로 각각 전달 받은 인수의 자료형이 숫자형태이면?
  // 두 인수를 더한 결괏값인 sum함수를 호출한 줄의 코드자리로 되돌려준다(반환한다.)
  return num1 + num2;
}
//--------------------------------------------------------------
//sum함수 호출
//호출할떄 인수 1과 인수11을 각각 매개변수 자리에 순서대로 전달해서 호출합시다.
let result2 = sum(1,11); // 1 + 11 = 12
console.log(result2); //12;


// 호출할때 인수"a"와 인수 "b"를 각각 전달해서 호출합니다.
// "a" 와 "b" 는 숫자형 데이터가 아니므로 합을 구할수 없다, return num1 + num2문에 의해 결과값을 반환받지 못한다
let result = sum("a","b");
console.log(result);// undefined;

console.log("_______________________________________________________________");

//화살표 함수 문법으로 위 sum함수의 기능을 똑같이 만들어보기
const sum2 = (num1,num2 ) => {

    if (typeof num1 !== "number" || typeof num2 !== "number")   {return;}
    return num1 + num2; // 함수 호출한 줄의 코드 자리로 계산된 결괏값을 되돌려 준다(값을 반환한다.)
};
//화살표 함수 호출
let result3= sum(35,102);
console.log(result3);//12


//단일 표햔식으로 작성된 화살표 함수는 중괄호와 return문을 생략할수있다
// 화살표 함수와 return문
// -> 화살표 함수에서  {  } 를 생략하면 화살표 다음에 오는 코드는 return문으로 처리된다.
// ex) 
const sum3=(num1,num2)=>  num1 + num2;

let result4 = sum3(110,120);
console.log(result4);
















</script>



    
    
</body>
</html>
