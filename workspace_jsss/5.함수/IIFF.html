<!DOCTYPE html>

<body>
    <script>
        /*  
         즉시 실행 함수?
            -함수를 만드는(선언하는) 동시에 바로 호출해서 실행하는 함수.

        작성 방법
            - 
            (   function()   {실행코드;}  ) (  );
            ------------------------------------------------------------
            (  function(    ) {    
              
            
            
                    실행코드;
            
            
            
            }  
             
            )();
             ㄴ>호출구문
            ----------------------------------------------------------------

            (  function 함수명(){ 실행코드; }  )   함수명();
                                                  ㄴ>호출구문
            -----------------------------------------------------------------                                


         */

/*
const init = function(){
        console.log("init")
};
init(); <------호출

*/

/*
즉시 실행함수
메모리에 데이터가 남아 있지않음
*/

( function init(){
//실행코드
console.log("initialized");

})();// 1번만 출력 가능??

// 재호출 불가능
init();

    
</script>    
</body>
</html>
