<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
/* 변수 만들떄 어떤 키워드를 사용??  let  또는 var
var 변수명 = 10; // <- 자바스크립트 이전 버전의 문법에서 var 예약어로 변수를 만들었다.
let 변수명 = 10; // <- 자바스크립트 상위 버전에서 업데이트되어 문법에서 let 예약어로 변수를 만들었다.
var num = 10;  // O
var num = 100; // O
let number = 10; // X
let number = 100; // X
*/
// 블록문 { } 를 기준으로 전역스코프 영역에 전역 변수 a를 선언 하고 10 저장
var a = 10; // <--전역변수 a
// 블록문{  }
{//-- 블록문 내부 영역(지역 스코프)에 var 키워드를 사용해여 지역변수를 만든 경우
    var b = 20; //-- 지역 변수 b
    console.log(`블록문 내부(지역 스코프)에서 a변수값 얻어 출력 : ${a}`);
    console.log(`블록문 내부(지역 스코프)에서 b변수값 얻어 출력 : ${b}`);

}
// 블록문 외부 영역(전역 스코프)에서 콘솔로그로 a전역변수,b지역변수 값 얻어 출력해보자.
    console.log(`블록문 외부(전역 스코프)에서 a변수값 얻어 출력 : ${a}`);//10;
    console.log(`블록문 외부(전역 스코프)에서 b변수값 얻어 출력 : ${b}`);//20;
//   ㄴ> 오류가 발생하지 않고 b지역변수 값 블록문 {  } 외부에서도 가져와 출력 O
//   ㄴ> 이유 : var 키워드로 만든 변수의 값은 블록문 {  } 내부에 각성해 놓을 지라도 ${b} 뱐수값을
//            출력하는 시점에 웹브라우저 프로그램은 var b; 변수 선언의 코드를 { }블럭문을 위로 
//            끌어올려 선언해 두기때문에 마치 var b; 전역 변수로 만들어지면서 {  }블록문 외부에서도 b변수값
//            20을 출력 할수 있습니다. ( _ Hoisting _ 호이스팅 ) 되어 끌어올리는 효과 발생!!
//                                    ㄴ> 블럭문{var b;}/지역 스코프  ==호이스팅==> 블럭문문{  } var b; /전역스코프 

console.log(`블록문 외부(전역 스코프)에서 b변수값 얻어 출력 : ${b}`); //20;
// var c; <---undf
//console.log(c);
let c = 10;
console.log(c);

</script>    
</body>
</html>
