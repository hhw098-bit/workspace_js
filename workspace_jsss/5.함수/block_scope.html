<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
// 아래의 블럭문 {  }을 기준으로 전역 스코프 영역

let a = 10; // 전역 변수 a선언 후 10 저장

// 블럭문 --> {      }

{//------------------ 지역스코프 영역에 지역변수 b선언 후 20 저장-----------------

let b = 20;
console.log(`블럭문 내부(지역 스코프)에서 a변수값 얻어 출력 : ${a}`);
console.log(`블럭문 내부(지역 스코프)에서 b변수값 얻어 출력 : ${b}`);

}

console.log(`블럭문 외부(전역 스코프)에서 a변수값 얻어 출력 : ${a}`);
console.log(`블럭문 외부(전역 스코프)에서 b변수값 얻어 출력 : ${b}`);
//오류발생 : Uncaught ReferenceError: b is not defined at block_scope.html:25:46
/*
코드를 실행하면 변수a는 전역스코프영역에 만들어놓아서 블록문{  } 내부나 외부에서 전부 참조가능하지만.
변수b는 지역스코프영역에 만들어 진 변수이므로 블럭문 외부에서는 참조가 불가능하다.

*/


</script>    
    
</body>
</html>
