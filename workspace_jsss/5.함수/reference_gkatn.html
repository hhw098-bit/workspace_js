<!DOCTYPE html>
<html lang="ko">

<script>
// 함수 외부 영역 ( 전역 스코프)=============================================//
let   a = 10;   // 전역 변수 메모리a
const b = 20;   // 전역 상수 메모리b


//---------블럭문--------------내부-----------------//
function sum (){
// 함수 내부 영역 (지역 스코프)
let   a = 50;   // 지역변수 메모리a
const b = 70;   // 지역상수 메모리b
console.log(`함수내부 a변수값 출력 : ${a}`); //50;
console.log(`함수내부 b상수값 출력 : ${b}`); //70;

}//----------블럭문------------내부-----------------//

sum();// 함수 호출

console.log(`함수외부 a변수값 출력 : ${a}`); //10;
console.log(`함수외부 b상상수값 출력 : ${b}`); //20;
// 함수 외부 영역 ( 전역 스코프)=============================================//

/*
전역스코프와 지역스코프에 같은 식별자(변수이름)을 가지는 
참조대상이 있다면, 먼저 같은 지역스코프영역에 만들어 놓은
식별자(변수이름)을 참조합니다. 그리고 같은 지역 스코프에서 찾지 
못할경우 전역 스코프 영역에 만들어 놓은 식별자(변수이름)을 찾습니다.
*/



</script> 
    

</body>
