<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
/*
함수를 만드는 (함수선언) 방법3가지
    방법1 선언문 function 방식으로 만들기
        function 함수명( ){
             실행코드;
        
        }

    방법2 표현식 방식으로 만들기
        const 상수명 = function        (  )  {      실행코드;       }; <- 익명함수
        const 상수명 = function 함수명  (  )  {      실행코드;       }; <- 네이밍함수


    방법3 화살표를 이용해 함수 만들기
        const 상수명 = (매개변수) => {실행코드;};



*/
//function printHello(){  console.log("Hello");}
//ㄴ>호이스팅
printHello();//아래에 함수 선언문 방식으로 만들어 놓은 함수 호출 가능
            // printHello(); <- 함수 호출 구문이 브라우저에 실행되는 시점에
            // 아래의 function printHello(){ 실행코드;}이 한쌍이  
            // 호출구문 위쪽으로 마치 끌어올리는 호이스팅 특징을 가지게 되어 printHello();호출구문쪽으로
            // 끌어올려 호출가능합니다.
 
function printHello(){ // 1.함수 선언문 방식으로 함수 만들기
 console.log("Hello");
//------------------------------------------------------------------------------------
// var number;  호이스팅 되어 변수선언이 된것임
//              변수선언만 된것이므로 undf가 저장됨

 console.log(Number); //undf가 출력
 var Number = 10; // undf -> 10으로 변경
 console.log(Number); // 변경값 10으로 출력력
}








</script>    
</body>
</html>
