<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
/*

*/

// x 함수 선언
function x(a,b){

console.log(a,b); //1,2;


}
//x함수 호출해서 사용
x(1,2);

console.log("+++++++++++++++++++++++++++++++++++++++++++++++++++++++");

//  y함수 선언
function y(num1,num2){

console.log(num1,num2); //undifinded, undifinded;
}
// y함수 호출할때 전달하는 인수가 없으면?
y();//undifined, undifined;

console.log("+++++++++++++++++++++++++++++++++++++++++++++++++++++++");

// z 함수 선언
function z(){

    console.log("매개변수 없으므로 인수를 전달받아 사용할수 없다. 하지만 오류가 발생하지 않음");
}
//z함수를 호출할떄 전달하는 인수를 넣어 호출하자
z(10,20);

//화살표 함수 정의시 매개변수 작성 방법
// const 상수명 = (매개변수1, 매개변수2) => { 매개변수1, 매개변수2 값을 사용해서 기능을 코드로 작성;   };
//s => 화살표 함수 선언
const s=(num1,num2) => {  console.log(num1,num2);};
// => 화살표 함수 호출할때 매개변수 넘1 자이리에는 인수 10을 전달 , 매개변수 넘2 자리에는 인수 20을 전달 하면서 호출
s(10,20);
// s2 => 화살표 함수 선언
const s2 = num1 => console.log(num1); 
// => 화살표 함수 호출할때 매개변수 넘1자리에 인수 100을 전달하면서 호출
s2(100);









</script>    







</body>
</html>
