<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
<script>
/*
 문제 : while 반복문을 사용하여 숫자 1부터 30까지 숫자중에서
    2의 배수 이면서 6의 배수인 숫자만 반복해서 출력
*/
//조건식 검사하는 조건변수 선언하고 초기값을 1로 저장
let i = 1;
while( i<=30 ){

    if(   i % 2 === 0 && i % 6 === 0  )
    document.write(i,"<br>");
    i++;
}




// while반복문 형태를 작성해서 숫자 1부터 30까지 숫자중에서 2의 배수이면서
// 6의 배수인 숫자만 반복해서 출력하세요
 




</script>    
</body>
</html>
