<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!--
주제 : while 반복문을 사용하여 펙토리얼 을 계산하는 웹애플이케이션    
        1부터 주어진 어떤 정수 숫자까지 곱한 결과
        ex) 3! = 1 * 2 * 3 = 6
            6! = 1 * 2 * 3 * 4 * 5 * 6 = 720

-->
<h1> while 반복문을 사용한 팩토리얼 계산 </h1>

<script>
/*
사이트 이용자에게 입력받은 정수 숫자까지의 팩토리얼 값을 구하기 위해
입력받은 정수 숫작밧을 n변수에 저장
*/
let n = prompt("정수 숫자를 입력하세요.","10");
/*
사이트 이용자가 입력을 했거나 하지 않았을 경우 각각 다른 메세지를 저장할 변수 선언
*/
let msg ="";
/*
프롬포트 함수를 이용해 입력 후 확인 버튼을 눌렀다면? (취소 버튼을 누르지 않았는지 체크)
*/
if(n !== null){
//입력한 값의 팩토리얼 계산 결과값을 저장할 변수를 선언하고 1로 초기화
let nFact = 1;
//---------------------------------------------------------------
//카운터 변수(조건변수) i를 선언하고 1로 초기화
let i = 1;

//i 조건변수에 저장된 값이 입력받은 숫자 (n변수에 저장된 값)보다 적거나 같을때 까지 반복하는데..
//조건 => 만약 3을 입력받았다면 i변수값이 1에 압력받은 숫자 3보다 적거나 같을때까지 반복합니다.
while ( i <= n){
//      i <= 1  -> true
//      i <= 2  -> true
//      i <= 3  -> true
//      i <= 4  -> false
//      반복문 종료

// nFact = nFact * 1;
//  1  =     1 * 1
//  1
//      i <= 2  -> true
// nFact = nFact * 2;    i++로 1씩 증가
//  1  =     1 * 2
//  2
//      i <= 3  -> true
// nFact = nFact * 3;    i++로 1씩 증가
//  2  =     2 * 3
//  6

    // 3팩토리얼? 1 x 2 x 3

nFact *= i;
i++; // 1 -> 2 -> 3 -> 4

} //nfact = 6
//--------------------------반복문 닫는기호----------------------------------------
msg = n + "! = " + nFact;

}
else {
//프롬포트 함수를 이용해 입력후 취소 버튼을 눌렀다면?
// 확인 버튼을 누르지 않았는지 체크 , 입력한 숫자가 없다면?
msg = "숫자 값을 입력하지 않았거나 취소 버튼을 눌러서 숫자를 얻지 못했다 "

}
document.write(msg);




    </script>
    
</body>
</html>
