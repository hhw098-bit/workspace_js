<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
        주제: 사이트 방문자에게 좋아하는 숫자를하나 입력받아
        입력받은 숫자 짝수인지 홀수 인지 if else 조건문을 사용하여 판단하여
        짝수일 경우 "당신이 좋아하는 숫자는 짝수입니다."
        웹브라우저 화면에 응답(출력)
        홀수일 경우 "당신이 좋아하는 숫자는 홀수입니다."
        웹브라우저 화면에 응답(출력)
    
        */
        //순서1 질의 응답창을브라우저 화면에 띄어 "당신이 좋아하는 숫자를 입력하세요" 라고 물어보세여
        //          그리고 입력받은 숫자를 let num변수 메모리에 저장

        //순서2 lf else 구문을 작성해서
        // 만약에 입력박은 num변수값이 짝수이냐라고 물었을때 짝수면
        // " 당신이 좋아하는숫자는 짝수입니다." <- 브라우저 화면에 출력
        let num = prompt("당신이 좋아하는 숫자를 입력하세요.", "홀짝구하기");

        if (num % 2 === 0) {

            document.write("당신이 좋아 하는 숫자는 짝수입니다.")
        }


        //입력받은 num변수 값이 짝수가 아니라면(홀수라면)
        // "당신이 좋아하는 숫자는 홀수 입니다." <-브라우저 화면에 출력
        else {

            document.write("당신이 좋아 하는 숫자는 홀수입니다.")

        }

    </script>
</body>

</html>
