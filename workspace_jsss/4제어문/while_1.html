<script>
    //조건식을 검사할 조건변수 선언 후 초기값을 저장
    let i = 1;
   /*
         i = 1 일때 1 <= 10 조건식 검사한 결과값은 참
         안녕하세요1
         i++ 증가 연산자를 통해 i변수값 2로 만들어줌

         i= 2 일때 2 <= 10 조건식 검사한 결과값은 참
         안녕하세요2

         i++ 증가연산자를 통해서 i변수값이 3으로 만들어줌

         i= 3 일때 3 <= 10 조건식 검사한 결과값은 참
         안녕하세요3

         i++ 증가연산자를 통해서 i변수값이 4으로 만들어줌

         i= 4 일때 4 <= 10 조건식 검사한 결과값은 참
         안녕하세요4
         ...... 

         i++ 증가연산자를 통해서 i변수값이 10으로 만들어줌

         i= 10 일때 10 <= 10 조건식 검사한 결과값은 참
         안녕하세요10

         i++ 증가연산자를 통해서 i변수값이 11으로 만들어줌

         i= 11 일때 11 <= 10 조건식 검사한 결과값은 거짓
         반복을 멈춤.
   */

    //  i변수에 저장된 값이 10보다 작거나 같을 동안만 계속 반복해서 실행문 실행
    while( i <= 10 ){

        //  조건식 i <= 10 의 결과가 참일때만 반복해서 실행될 실행문 과 증감식;

        // 실행문: 조건식의 결과가 참일때만 반복실행될 문장(실행문)
        document.write("안녕하세요" + i , "<br>");

        // 증감식 : i변수에 저장된 값을 1번씩 반복해서 증가해서 저장
        i++;

    }

</script>
