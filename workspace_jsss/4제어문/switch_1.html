<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        switch(비교할값 또는 식 또는 변수명){
                 case 비교할 값과 같은지 판단값 값1:
                     비교할값과 판단값1 이 같으면 실행할 실행문코드1;
                     break;   
                
                 case 비교할 값과 같은지 판단값 값2:
                     비교할값과 판단값2 이 같으면 실행할 실행문코드2;
                     break;   
            
                 case 비교할 값과 같은지 판단값 값3:
                     비교할값과 판단값3 이 같으면 실행할 실행문코드3;
                     break;   
        
                     ......
                default :
                    위에 작성된 모든 case유형의 판단 값1, 값2, 값3가 
                    비교할 값과 같지 않으면 실행할 실행문 코드;
        } 
        */
       switch(9){

            case 1 :// 10과 1이 같으냐 라고 물어보는 조건
                    document.write("10과 1은 같다.");
                    break;
            case 2 :// 10과 2가 같으냐? 라고 물어보는 조건
                    document.write("10과 2는 같다."); 
                    break;            
            case 3, 4, 5 :// 10이 3,4,5와 같으냐 라고 물어보는 조건 
                    document.write("10과 3또는4또는 5와 같다.");               
                    break;
            case 10 : // 10과 10이 같으냐? 라고 묻는 조건 
                    // 같으면 실행될 코드작성
                    document.write("10과 10은 같다.");
                    break;
        default : //비교할 10이 위에 작성한 모든 case유형에 적은 판단값들과 다를 경우 조건
                    document.write("모두 다르다");
                    break;            
       }
        document.write("-------------------<br>");

        /*
        주제: 사이트 이용자에게 즐겨 이용하는 사이트 명을입력받아
                입력받은 사이트를 자동으로 재요청해서 웹브라우저 화면에 보여주는 ex)
        */
        //순서1 prompt함수를 작성해서 즐겨 이용하는 사이트 명을 입력받아 site변수 메모리에 저장
        let site = prompt("네이버, 다음, 네이트, 구글 중 즐겨 이용한느 사이트명 하나 입력하세요" ,"네이버");
        //입력받은 사이트명에 따라 실제 http요청할 url주소를 저장할 변수 선언
        let url; //<- 네이버 입력받으면? url = www.naver.com
                 //<- 다음 입력받으면? url = www.daum.net
                 //<- 네이트 입력받으면? url = www.nate.com
                 //<- 구글 입력받으면? url = www.google.com
        //순서2 switch 선택문을 이용하여 입력받은 사이트명에 따라
        //       각 사이트 주소를 각각 url 변수에 따로 저장시키자
        switch(site){  // 사용자로 부터 입력받은 사이트명
               case  "네이버" : //위 사이트변수에 저장된 입력한 사이트명이 "네이버" 문자열과 같으냐?
                        url = "www.naver.com"; //url변수에 네이버 사이트 주소 저장
                  break; // switch문의 {  } 중에서 }닫는 기호 영역 벗어나는 예약어

               case  "다음" ://위 사이트변수에 저장된 입력한 사이트명이 "다음음" 문자열과 같으냐?
                        url = "www.daum.net";//url변수에 다음 사이트 주소 저장
                  break;
               
               case "네이트" ://위 사이트변수에 저장된 입력한 사이트명이 "네이트트" 문자열과 같으냐?
                        url = "www.nate.com";//url변수에 네이트 사이트 주소 저장
                   break;
               case "구글" ://위 사이트변수에 저장된 입력한 사이트명이 "구글글" 문자열과 같으냐?
                    url =  "www.google.com";//url변수에 구글 사이트 주소 저장    
                    break;

               default : //네이버 다음 네이트 구글 이외의 다른 사이트 명을 사용자가 입력했을때  
                        // 알림 메세지창 띄우기 -> alert("알림 메세지");
                    alert("당신은 바보입니까?!");
                    break;   
        }//<--------------switch 문} 닫기
        //순서3 조건문 if를 활용하여 변수 url에 주소가 저장되어 있다면? 이라는 조건식 작성
        if (url) {
             // 자바스크립트 문법에서 브라우저 주소창에 주소 자동입력되게 하고 엔터 까지 눌러 재요청하는 기술
             //lacation 객체 메모리 내우에 변수 재요청할 주소를 저장하면
             // 이코드를 실행했을때 웹브라우저 주소창에 자동으로 재요청할 주소가 적히면서 엔터를 누른
             // 효과를 주어 재요청하게 된다.
             // -> location.href = "재요청할 url";
             location.href = "http://" + url; // + www.google.com
                            //"http://www.google.com"


        }







    

                    

       








    </script>




    
</body>
</html>
