<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- css 작성할 선언문 태그 영역-->
<style>

/*바깥 for문에서 9번 반복되면서  출력되는 모든 div를 한번에 선택해서 가져와 스타일 정의*/
div {
    
/*인라인 블록으로 설정하여 가로로 나열되도록 합시다.*/
display: inline-block;

border: 1px solid gray;
/*패딩 설정   위쪽 0, 오른쪽 20 , 아래쪽 30px 왼쪽 20*/
padding:  0      20px    30px    20px;
/* 마진 설정 모든 영역 15px 여백백*/
margin: 15px ;

/*줄 간격 글자 크기의 2배로 설정*/
line-height: 2;

}


</style>

</head>
<body>
<script>
/*주제
중첩 for문 (바깥 for 안에 안쪽for를 함께 사용한 구문)으로
1단부터 9단까지 구구단을 htme + css 형태로 화면에 출력합니다.

중첩 for문이란?
for문 안에 또 다른 for문을 넣는 방식입니다.
바깥 for가 1번 반복할때, 안쪽 for는 처음부터 끝까지 반복해서 전부 실행합니다.
*/
// i : 바깥 for에서 사용 (현재 몇 단인지, 1~9)
// j : 안쪽 for에서 사용 (곱하는 수, 1~9)
let i, j;
/*
바깥쪽 for문
i=1에서 시작 -> i가 9이하일때 까지 반복 -> 한번 반복할때 마다 i를 1씩 증가
즉, 1단 2단 3단 ... 9단을 차례로 생성
*/
for(i=1; i <=9; i++){
// 각 단마다 css가 적용된 박스div를 시작
// 위쪽 <style>에 div { border , padding, margin ...  }이 적용됩니다.
document.write("<div>");

   //현재 단 번호를 제목태그(h3)으로 출력합니다.
   //예 : i가 3이면 화면에  <h3>3단</h3> 이 만들어져 출력 됩니다.
document.write("<h3>" + i + "단</h3>");
    /*
    안쪽 for문
    j=1에서 시작, j가 9이하일때 까지 반복-> 한번 반복할때 마다 j를 1씩증가
    바깥for의 i값은 그대로 두고 j만 1부터 9까지 바뀝니다.
    
    */
   //i= 4일때  j = 1 -> 4 x 1 = 4 
//             j= 2 -> 4 x 2 = 8
    for(j=1; j<=9; j++){
        //구구단 한줄을 출력
        // i * j : 곱셈 결과 ex 5 x 3 = 15에서 15출력
        document.write( i + " X " + j + " = " + i*j + "<br>");

    }//안쪽 for문 끝 ( j가 10이 되면 여기로 나옵니다.)




document.write("</div>");

}





</script>    
</body>
</html>
