<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    /* 테이블과 셀에 대해 동일한 스타일 적용 */
        table, td {  
        /*테이블과 셀의 테두리 선 설정해서 보여주기*/
        border: 1px solid gray;

        /*테이블과 바깥 테두리 선과 셀의 바깥 테두리를 합쳐서 중복되지 않도록 하기*/
        border-collapse: collapse;

    }
    /*셀에 대한 추가 스타일 정의*/
    td {
        padding: 5px;
        font-size: 0.9em; /*글자 크기를 0.9em으로 설정    상대적인 크기를 나타낸   1em = 16px*/

    }


</style>



</head>
<body>
<!--주제 입장객 수와 한줄에 앉을수 있는 사람의 수를 입력받아 좌석 배치도를 생성하는 프로그램-->
<h1> 자리 배치도</h1>

<script>
    // i와 j는 반복문에서 사용할 변수 입니다.
    // i는 현재 줄(행)의 위치번호가 저장
    //j는 현재 줄에서 의 열위치번호가 저장
let i,j;

//전체 입장객수를 prompot 함수를 이용해 입력박아 memNum 변수에 저장
let memNum = prompt("입장객은 몇 명인가요?");
//결론  memNum 변수에 저장되는 값은 입력받은 전체 입장객수 ! 저장된다.

// 한줄에 앉을수 있는 사람수 를 입력 받아 culNum변수에 저장
let colNum = prompt("한 줄에 몇 명씩 앉습니까? ");
// culNum변수에 저장되는 값은 한줄에 앉을수있는 사람의 수를 저장

// 전체 줄(행) 수를 계산하여 저장할 rowNum변수 선언
let rowNum;
    /*
    예를 들어 전체 입장객수가 (memNum) 10명이고
    한줄에 안줄수 있는 사람수가(colNum) 4명 이라고 가정하면 
    전체 줄수(rowNum)를 다음과 같이 계산합시다.

    첫뻔째 줄 : 4명
    두번째 줄 4명
    세번째줄 2명     ( 총 입장객수는 10명이기에 마지막 줄은 2명)
    따라서 rowNum변수값은 3줄
    */
/*
전체 줄수 계산
전체 입장객수를 한줄에 앉을수 있는 사람수로 나누었을때 나머지가 0이면
*/
if(memNum % colNum === 0){
//전체 줄수는 memNum / colNum 이 됩니다.
rowNum = parseInt(memNum / colNum);
}else {//나머지가 0이 아니면 
    // 전체 줄수는 memNum / colNum의 몫에 1을 더한 값이 됩니다.
    // 이는 마지막 줄에 남은 좌석을 위해 한줄을 더 추가하는 것입니다.
    rowNum = parseInt(memNum / colNum) + 1;
}

/*테이블 표 생성*/
document.write("<table>"); // 테이블 표의 시작 태그
//바깥쪽 for반복문은 전체 줄수만큼 반복합니다
for(i=0; i<rowNum; i++){
    // 각줄은 <tr>태그로 시작됩니다.
        document.write("<tr>");
           
            //안쪽 for반복문은 한줄에 안줄수있는 사람수만큼 반복
          for(j=1; j<=colNum; j++){
            /* 현재 좌석 번호를 계산 
            첫번째 줄 (i=0)
            i = 0
            j= 1부터 4가 될때 까지 반복
            좌석 번호는 아래 와 같이 계산된다.
            seatNo = 0 * 4 + 1; -> 1
            seatNo = 0 * 4 + 2; -> 2
            seatNo = 0 * 4 + 3; -> 3
            seatNo = 0 * 4 + 4; -> 4
            따라서 첫번째 줄에는 좌석번호 1234가 배치됨.
            
            두번째 줄 (i=1)
            i = 1
            j= 1부터 4가 될때 까지 반복
            좌석 번호는 아래 와 같이 계산된다.
            seatNo = 1 * 4 + 1; -> 5
            seatNo = 1 * 4 + 2; -> 6
            seatNo = 1 * 4 + 3; -> 7
            seatNo = 1 * 4 + 4; -> 8
            따라서 첫번째 줄에는 좌석번호 5678이이 배치됨.

            세번째 줄 (j=2)
            i = 2
            j= 1부터 4가 될때 까지 반복
            좌석 번호는 아래 와 같이 계산된다.
            seatNo = 2 * 4 + 1; -> 9
            seatNo = 2 * 4 + 2; -> 10
            세번째 줄에는 좌석 9,10이 배치되고
            그다음은 seatNo가 입장객 수 (memNum)보다 커지므로
            break문에 의해 반복이 종료
            
            
            */
            let seatNo = i * colNum + j;


/*
좌석번호가 전체 입장객수를 초과하면 반복문종료
마지막 세번째 줄에는 좌석 번호가 9,10이 배치가 되고
그다음은 seatNo가 전체 입장객수(memNum) 보다 커지므로 
break문에 의해 반복종료
*/

            if(seatNo > memNum){
                break;

            }
            // 현재 좌석 번호를 테이블 셀 <tb>태그사이에 추가해서 보여주기
                document.write("<td> 좌석 " + seatNo + "</td>");


          }//안쪽 for  




        //각줄은 닫는태그로 종료
            document.write("</tr>");



}//바깥쪽 for




document.write("</table>"); // 테이블 표의 끝을 알리는 태그




</script>


    
</body>
</html>
