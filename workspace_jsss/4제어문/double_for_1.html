<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
//구구단 2단에서 9단까지 결과를 반복문을 이용해서 화면에 출력하는 예제
//바깥쪽 for문 : 2단부터 9단까지 차례대로 반복 진행합니다.
for( let i = 2; i <= 9; i++){//i변수는 현재 몇단인지 의미 1단 2단...9단
    //현재 몇단인지 크게 표시합니다.
    document.write("<h1>구구단 " + i + "단 </h1>");
    
    /*작동원리
    바깥 for의 i = 2, 안쪽 for의 k = 1 -> "2 X 1 = 2" 출력
    바깥 for의 i = 2, 안쪽 for의 k = 2 -> "2 X 2 = 4" 출력
    바깥 for의 i = 2, 안쪽 for의 k = 3 -> "2 X 3 = 6" 출력
    ...
    바깥 for의 i = 2, 안쪽 for의 k = 9 -> "2 X 9 = 18" 출력
    바깥 for의 i = 2, 안쪽 for의 k = 10 -> 안쪽 for문 종료후 바깥쪽 증감문으로 이동 i는 2->3증가
    
    바깥 for의 i = 3, 안쪽 for의 k = 1 -> "3 X 1 = 3" 출력
    바깥 for의 i = 3, 안쪽 for의 k = 2 -> "3 X 2 = 6" 출력
    바깥 for의 i = 3, 안쪽 for의 k = 3 -> "3 X 3 = 9" 출력
    ...
    바깥 for의 i = 3, 안쪽 for의 k = 9 -> "3 X 9 = 27" 출력
    바깥 for의 i = 3, 안쪽 for의 k = 10 -> 안쪽 for문 종료후 바깥쪽 증감문으로 이동 i는 3->4증가
    
    */
    
    //안쪽 for문 : 각 단마다 곱하는 수만큼 차례대로 반복합니다.    
    for(let k = 1; k<=9; k++){//k변수에 저장되는 값들은 곱하는 숫자들 1~9
        // 2 x 1 = 2,     2 x 2 = 4,     2 x 3 = 6
        document.write(i + " X " + k + " = " + (i*k) + " 입니다.<br>");
    } //안쪽 for문 닫기   

}//바깥쪽 for문 닫기
/*
바깥쪽 for문이 한번 반복할때마다 
안쪽 for문이 9번 실행
총 2*9*9 실행
*/





</script>    
</body>
</html>
