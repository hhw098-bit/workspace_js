<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제2. 사이트 이용자에게 핸트폰 번호 입력 받아 정규표현식객체의 패턴에 맞게 입력했는지 검사
        
        */

let userCall = prompt("전화번호 주세요");

/*
    정규표현식 객체 작성
    - 입력한 핸드폰 번호 문자열에 "010,016 또는 011로 시작하고"
      그 뒷자리는 3~4사이의 숫자와 마지막자리 입력은 4개의 숫자가 입력됬는지 검사하는 정규표현식

*/
let reg =  /^(010|016|011)\d{3,4}\d{4}$/;
/*
            ^         :    입력한 검사할 문자열 시작함
       (010|016|011)  :    010 또는 016 또는 011 중 하나와 일치하는지 검사하는 패턴     
        \d{3,4}       :  숫자로 3~4 사이로 입력했는지 검사하는 패넡
        \d{4}         : 숫자로 4자리로 입력했는지 검사하는 패턴
       \d{4} $        : 마지막 입력자리 $에는 숫자 4자리로 입력했는지 검사하는 패턴    

*/

while(true){

    //        = 정규표현식.test("검사할대상문자열");
   let result = reg.test(userCall);

    if(result === true){ // 입력한 핸드폰 번호가 정규표현식 객체의 패턴에 맞게 입력했다면?
                break;

    }
    // 제대로 입력하지 않았다면?
    alert("핸드폰 번호 입력 형식이 잘못되었습니다. 다시 입력바람");
    //다시 입력
    userCall = prompt("장난치지마쇼");



}






    </script>
    
</body>
</html>
