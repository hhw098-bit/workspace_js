<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<button data-cnt="10">
    가방구매
</button>

<button data-cnt="0">
    신발구매
</button>




<script>

const buttonEls = document.querySelectorAll("button");
// [ <button data-cnt="10">  가방구매 </button> , <button data-cnt="0"  신발구매 </button> ]
//                                0              ,                   1
    
    buttonEls.forEach(function(el){
// dataset속성을 호출하여 각 button요소의 data- 로 시작하는 속성의 값을 가져왔습니다.
// button요소의 data- 시작하는 속성에 대한 정보를 가져오는데
// DOMStringMap 객체에 담아 DOMStringMap객체 자체를 반환해서 가져옵니다.
    console.log( el.dataset);
// DOMStringMap 객체의 모습 --------->  cnt :  10
// DOMStringMap 객체의 모습 --------->  cnt :   0

// data-cnt속성의 값만 가져오고 싶다면?
// 선택한 Button요소.dataset.cnt속성명을 작성하면? '10'값만 가져올수 있음
console.log(el.dataset.cnt); // 10;
                            //  0;

el.dataset.cnt = 50;
console.log(el.dataset.cnt); // 50;
                            // 50;



});


</script>
    



</body>
</html>
