=======================================================================================
자바스크립트 객체 종류 크게 2가지
        종류1> 사용자 정의 객체    
        종류2> 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체들    


종류2> 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체들

            1. 내장객체들
                date 내장객체: 날짜와 시간 정보를 처리할때 사용하는 객체
                string 내장객체: 문자열을 조작하거나 문자열 관리를 객체
                array 내장 배열객체: 배열 메모리 를 생성해서 값을 관리하는 객체
                Math 내장 객체: 수학 연산관련 메소드들을 제공
                Math 내장 객체: 수학 연산관련 메소드들을 제공

            2. 브라우저 객체모델들
                window 브라우저 객체 : 웹 브라우저 창 하나의 전체 정보를 가지며 관리하는 객체        
                screen 브라우저 객체 : 모니터 정보를 제공받거나 모니터 정보 관리하는 객체      
                location 브라우저 객체 : 웹브라우저 주소창에 입력한 url 관리하는 객체      
                history 브라우저 객체 : 브라우저에서 요청한 페이지로 이동하는 기능의 메소드 제공 객체      
                ...

            3. 문서객체(DOM)들
                .html 에 작성된 모든 html 태그들을 브라우저가 해석해서 변환후 제공하는 객체들
                예) <h1>안녕</h1>   <---   <h1> 문서 객체
                예) <div>박스</div>    <----  <div> 문서 객체
==========================================================================================================================================================================================================


       내장 객체글 종류 중에서 
        -> Date 객체 : 날짜와 시간 정보를 관리하고 처리할때 사용되는 메소드들을 제공하는 내장 객체,
            
            1 date객체 메모리 생성 방법
                let 참조변수명 = new Date();

                     참조변수명.getMonth(); //  현제 컴퓨터에 설정된 월 값을 반환 하는 기능의 메소드 호출   
                    .....


-->

<script>
    /*

                            let 참조변수명 = new date();

    */

   let nowMonth = today.getMonth() + 1;

     반환받는 값으로 현재 몇일인지에 대한 정보를 숫자 값으로 하나 반환 해 줍니다.
*/
        let nowDate = today.getDate();

*/
