<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


</head>




<body>

    
    <form name="frm1">
            <input type="text" name="userid">
    </form>
    
    <form name="frm2">
            <input type="text" name="username">
    </form>
    
    <form name="frm3">
            <input type="text" name="usernick">
    </form>
    
    <script>

/*
            <from> 요소노드를 선택해서 가져오는 방법
                html문서에 작성된 <from>은 document최상위 부모노드객체를 이용해 선택할수 있습니다.
                    2가지 방법으로 <from> 을 선택합니다.
                
                방법1 <from>요소의 name속성값을 이용해 직접 선택하는 방법         
                방법2 document  객체의 forms 속성을 이용해 선택하는 방법        

*/

/*
       <form> 요소노드 선택해서 가져오는 방법1
           -> <form> 요소의 name속성에 부여된 값을 이용해 <form>을 선택하는 방법

            문법
                document.form요소에 설정된 name속성값;
            설명 
                name속성값이 적힌 <form>요소 한쌍을 선택해 옵니다.

 */

 console.log(document.frm1); //name=frm1 작성되어있는 <form name="frm1"></form> 한쌍만 선택
 console.log(document.frm2); //name=frm2 작성되어있는 <form name="frm2"></form> 한쌍만 선택
 console.log(document.frm3); //name=frm3 작성되어있는 <form name="frm3"></form> 한쌍만 선택


const HTMLCollections = document.forms;
console.log(HTMLCollections[0]); // <form name="frm1">...</form>
console.log(HTMLCollections[1]); // <form name="frm2">...</form>
console.log(HTMLCollections[2]); // <form name="frm3">...</form>










    </script>



</body>
</html>
