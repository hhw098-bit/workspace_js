<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
/*
주제1 사용자 정의 객체 만들기
객체생성(만들기) 방법2. 리터럴 {  } 이용
    let 참조변수명 = { 속성명 : 값, 메소드명 : function(){  코드;  }  };

*/

let book1 = { title : "웹 표준의 정석", pages : 648  };
//                  속성명: "문자열값", 석상명: 숫자값

/*
주제2 객체의 "속성명:값" 한쌍 중에 값
            방법1 . 표기법 이용
            방법2 [ ] 표기법 이용

            let book1 = { title : "웹 표준의 정석", pages : 648  };


*/
// 방법1 . 표기법
// 객체참조변수명.속성명   ->   객체  {   } 내부에 만들어진 " 속성명 : 값 " 중에서 " 값 " 얻는 문법.
console.log(book1.title); // 웹표준의 정석석
// 방법1.1  . 표기법
//  객체참조변수명.속성명 = 변경할값; -> 객체 {  } 내부에 "속성명:값" 중에서 "값" 변경 문법
    book1.title = "웹 표준의 정석2";
console.log(JSON.stringify(book1)); // '{ title: "웹 표준의 정석2", pages:648}'
// let book1 = { title: "웹 표준의 정석2", pages:648}; 현제 book1 상태

//방법2 [  ] 표기법 이용
//          객체참조변수명[ "속성명" ] -> 객체{  }내부에 "속성명:값" 중에서 "값" 얻는 문법
console.log(book1["title"]); //"웹 표준의 정석2"
//방법2.1 [   ] 표가법 이용
//            객체참조변수명[ "속성명" ] = 변경할값; -> 객체{  }내부에 "속성명:값" 중에서 "값" 변경 문법
book1["title"] = "웹 표준의 정석";
console.log(JSON.stringify(book1)); // {"title":"웹 표준의 정석","pages":648} 로 객체 내부 변경

/*
주제3 " 속성명 : 값 " 이 존재 하지 않는 비어있는 객체 {  } 를 생성한 후
        나중에 " 속성명: 값 " 한쌍씩 추가 할수 있다.

*/
let book2 ={   }; // 비어있는 객체
// ㄴ>  let book2 = new Object();  비어있는 객체

// book2 비어있는 객체에 "속성명:값" 한쌍을 넣어 객체의 정보를 수정할수 있다.
book2.title = "Javascript";
// { title : "Javascript"}
book2.pages = 500;
// {title : "Javascript", pages : 500}
book2.author = "김개똥";
// {title : "Javascript", pages : 500, author: "김개똥"}

//변경된 객체 확인 하기 위해 출력
console.log(JSON.stringify(book2)); // {"title":"Javascript","pages":500,"author":"김개똥"};

/*
주제4 객체 {  }내부에 만들어져있는 "속성명:값" <- 한쌍 삭제 하기
    삭제 작성 문법
            delete 객체참조변수명.속성명;
*/
delete book2.pages;
//변경된(삭제된) 객체 확인 하기 위해 출력
console.log(JSON.stringify(book2)); // {"title":"Javascript","author":"김개똥"}  --->  "pages": 500 삭제;

// "author":"김개똥" 한쌍 삭제하기
delete book2.author;

// 변경된 객체 환인하기위해 출력
console.log(JSON.stringify(book2)); // {"title":"Javascript"} --> "author": "김개똥' 삭제;

/*
주제5   객체 중첩 하기 ( {  }객체 안에 "속성명:값" 에서 "값"자리에 {  }객체를 포함시킬수 있다.)

        { 속성명:값1,   속성명2: { 속성명3 : 값3 , 속성명4 : 값4  } }
                   ㄴ> 속성명2: {------------값2---------------}    

        {
            속성명1 : 값1,
            속성명2 : {
                        속성명3 : 값3 ,
                        속성명4 : 값4
                    }                                
        }
                   
*/

let student = {  // <---- 바깥 객체 : student
                name :  "Doremi",
                score: {  //  <--- 안쪽 객체 : score
                        history : 85,  // <--- 안쪽객체의 속성명
                        science : 94,
                        average : function(){ // <--- 안쪽객체의 메소드명명
                                              return ( this.history  + this.science ) / 2 ; 
                                            // return (      85      +       94     ) / 2 ;
                                            // return (             179             ) / 2 ;
                                            // return (            89.5             )     ;   
                                            }                     
                       }
              }
// histoty 속성명과 함꼐 저장된 85 점수 가져오고 싶다  --> 바깥객체명.바깥속성명.안쪽객체의 속성명
console.log(student.score.history); //역사점수 85점 ;

// history 과목과 science 과목의 평균을 구해서 얻고 싶다.
// 방법. average 메소드 호출 하면 된다.
// 호출 방법 ===> 바깥객체명.바깥속성명.안쪽객체의_ 메소드명(); 
console.log(student.score.average()); // 89.5;


















</script>


    
</body>
</html>
