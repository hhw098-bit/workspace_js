<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 변수 3차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - const 와 let 골라 쓰기</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
    // const 상수명 = 초기값
    // let 변수명 = 초기값  
    // [TODO 1] 캐릭터 이름 characterName 을 const 로 만드세요. (안 바뀜)  ↓
    //->캐릭터 이름은 안 바뀌므로, const로 cgarcterName 상수 메모리를 만들고 해적 데이터 저장  
    const characterName = "해적";
      
    // [TODO 2] 레벨 level 을 let 으로 만들고 1 을 넣으세요.  ↓
    //->레벨은 게임중 바뀌므로, let으로 level 변수 메모리를 만들고 1을 저장    
    let level = 1;
      console.log(level);
    // [TODO 3] 레벨업! level 을 2 로 바꾸세요.  ↓
    //->레벨업 let으로 만든 변수 메모리라서 level 메모리에 2를 다시 저장 가능 (1->2)
      level = 2;
    // [TODO 4] characterName 과 level 을 출력하세요.  ↓
       
    console.log(characterName,level);
    // ✅ 이름은 그대로, 레벨은 1→2 로 바뀌면 성공!
  </script></body></html>
