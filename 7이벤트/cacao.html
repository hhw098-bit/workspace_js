<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <!-- 카카오 우편번호 API -->
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #222;
        }
        .signup-container {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
        }
        .signup-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }
        .signup-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .signup-table {
            width: 100%;
            border-collapse: collapse;
        }
        .signup-table td {
            padding: 10px;
            border: 1px solid #dce4ef;
            vertical-align: top;
        }
        .signup-table input[type="text"],
        .signup-table input[type="password"],
        .signup-table select,
        .signup-table textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8e3;
            border-radius: 8px;
            font-size: 14px;
        }
        .signup-table textarea {
            min-height: 100px;
            resize: vertical;
        }
        .signup-table button,
        .signup-table input[type="button"] {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }
        .signup-table button:hover,
        .signup-table input[type="button"]:hover {
            background: #1d4ed8;
        }
        span { color: red; display: inline; }
    </style>
</head>
<body>
<div class="signup-container">
    <div class="signup-card">
        <div class="signup-title">회원가입</div>
        <table class="signup-table">
            <tr>
                <td>*이름</td>
                <td>
                    <input type="text" id="uName" placeholder="김개똥" />
                    <span id="name">이름을 입력해주세요</span>
                </td>
            </tr>
            <tr>
                <td>*ID</td>
                <td>
                    <input type="text" id="uID" placeholder="admin" />
                    <span id="id">ID를 입력해주세요</span>
                </td>
            </tr>
            <tr>
                <td>*비밀번호</td>
                <td>
                    <input type="password" id="uPWD" placeholder="1234" />
                    <span id="pwd">비밀번호를 입력해주세요</span>
                </td>
            </tr>
            <tr>
                <td>*비밀번호 확인</td>
                <td>
                    <input type="password" id="uPWD_Confirm" />
                    <span id="pwd_confirm">비밀번호 확인란 입력해주세요</span>
                </td>
            </tr>
            <tr>
                <td>*주소</td>
                <td>
                    <input type="text" id="sample6_postcode" placeholder="우편번호">
                    <input type="button" onclick="sample6_execDaumPostcode()" value="우편번호 찾기"><br>
                    <input type="text" id="sample6_address" placeholder="주소"><br>
                    <input type="text" id="sample6_detailAddress" placeholder="상세주소">
                    <input type="text" id="sample6_extraAddress" placeholder="참고항목">
                </td>
            </tr>
            <tr>
                <td>*직업</td>
                <td>
                    <select id="work">
                        <option value="직업명" selected>직업명</option>
                        <option value="기타">기타</option>
                        <option value="회사원">회사원</option>
                        <option value="학생">학생</option>
                    </select>
                    <span id="work-error">직업 하나를 선택해 주세요</span>
                </td>
            </tr>
            <tr>
                <td>*성별</td>
                <td>
                    남자<input type="radio" name="sex" id="s1" value="male" />
                    여자<input type="radio" name="sex" id="s2" value="female" />
                    <span id="gender-error">성별을 체크해 주세요</span>
                </td>
            </tr>
            <tr>
                <td>*취미</td>
                <td>
                    <input type="checkbox" id="h1" value="독서" />독서
                    <input type="checkbox" id="h2" value="등산" />등산
                    <input type="checkbox" id="h3" value="낚시" />낚시
                    <span id="hobby-error">취미를 하나이상 체크 해 주세요</span>
                </td>
            </tr>
            <tr>
                <td>*가입동기</td>
                <td>
                    <textarea id="motivation" placeholder="가입동기를 두줄 이상 입력 하시오."></textarea>
                    <span id="motivation-error">가입 동기를 입력해주세요</span>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="button" value="가입" id="submit" />
                </td>
            </tr>
        </table>
    </div>
</div>

<script>
function sample6_execDaumPostcode() {
    new kakao.Postcode({
        oncomplete: function(data) {
            var addr = '';
            var extraAddr = '';

            if (data.userSelectedType === 'R') {
                addr = data.roadAddress;
            } else {
                addr = data.jibunAddress;
            }

            if(data.userSelectedType === 'R'){
                if(data.bname !== '' && /[동로가]$/.test(data.bname)){
                    extraAddr += data.bname;
                }
                if(data.buildingName !== '' && data.apartment === 'Y'){
                    extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                if(extraAddr !== ''){
                    extraAddr = ' (' + extraAddr + ')';
                }
                document.getElementById("sample6_extraAddress").value = extraAddr;
            } else {
                document.getElementById("sample6_extraAddress").value = '';
            }

            document.getElementById('sample6_postcode').value = data.zonecode;
            document.getElementById("sample6_address").value = addr;
            document.getElementById("sample6_detailAddress").focus();
        }
    }).open();
}

document.getElementById("submit").addEventListener("click", function() {
    let valid = true;

    const name = document.getElementById("uName").value.trim();
    if (name === "") { document.getElementById("name").style.display = "inline"; valid = false; }
    else { document.getElementById("name").style.display = "none"; }

    const id = document.getElementById("uID").value.trim();
    if (id === "") { document.getElementById("id").style.display = "inline"; valid = false; }
    else { document.getElementById("id").style.display = "none"; }

    const pwd = document.getElementById("uPWD").value;
    const pwdConfirm = document.getElementById("uPWD_Confirm").value;
    if (pwd === "") { document.getElementById("pwd").style.display = "inline"; valid = false; }
    else { document.getElementById("pwd").style.display = "none"; }
    if (pwdConfirm === "" || pwd !== pwdConfirm) { document.getElementById("pwd_confirm").style.display = "inline"; valid = false; }
    else { document.getElementById("pwd_confirm").style.display = "none"; }

    const work = document.getElementById("work").value;
    if (work === "직업명") { document.getElementById("work-error").style.display = "inline"; valid = false; }
    else { document.getElementById("work-error").style.display = "none"; }

    if (!document.getElementById("s1").checked && !document.getElementById("s2").checked) {
        document.getElementById("gender-error").style.display = "none"; }

    if (!document.getElementById("s1").checked && !document.getElementById("s2").checked) {
        document.getElementById("gender-error").style.display = "inline"; valid = false;
    } else { document.getElementById("gender-error").style.display = "none"; }

    if (!document.getElementById("h1").checked && !document.getElementById("h2").checked && !document.getElementById("h3").checked) {
        document.getElementById("hobby-error").style.display = "inline"; valid = false;
    } else { document.getElementById("hobby-error").style.display = "none"; }

    const motivation = document.getElementById("motivation").value.trim();
    if (motivation.split("\n").length < 2) {
        document.getElementById("motivation-error").style.display = "inline"; valid = false;
    } else { document.getElementById("motivation-error").style.display = "none"; }

    if (valid) {
        alert("회원가입이 완료되었습니다!");
    }
});
</script>
</body>
</html>
